{% extends "base.html" %}
{% block content %}
<h2>Edit Product</h2>
<form method="POST">
    <div class="mb-3"><label>Product Name</label><input type="text" name="name" class="form-control" value="{{ product.name }}" required></div>
    <div class="mb-3"><label>Cost Price (TZS per unit)</label><input type="number" step="0.01" name="cost_price" class="form-control" value="{{ product.cost_price }}" required></div>
    <div class="mb-3"><label>Selling Price (TZS per unit)</label><input type="number" step="0.01" name="selling_price" class="form-control" value="{{ product.selling_price }}" required></div>
    <div class="mb-3"><label>Unit of Measure</label>
        <select name="unit" class="form-select">
            <option value="piece" {% if product.unit == 'piece' %}selected{% endif %}>Piece</option>
            <option value="liter" {% if product.unit == 'liter' %}selected{% endif %}>Liter</option>
            <option value="ml" {% if product.unit == 'ml' %}selected{% endif %}>Milliliter (ml)</option>
            <option value="gallon" {% if product.unit == 'gallon' %}selected{% endif %}>Gallon</option>
            <option value="kg" {% if product.unit == 'kg' %}selected{% endif %}>Kilogram (kg)</option>
            <option value="gram" {% if product.unit == 'gram' %}selected{% endif %}>Gram (g)</option>
        </select>
    </div>
    <div class="mb-3"><label>Low Stock Threshold (in units)</label><input type="number" step="0.01" name="low_stock_threshold" class="form-control" value="{{ product.low_stock_threshold }}"></div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
