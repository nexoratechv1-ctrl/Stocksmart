{% extends "base.html" %}
{% block content %}
<h2>Edit Product</h2>
<form method="POST">
    <div class="mb-3"><label>Product Name</label><input type="text" name="name" class="form-control" value="{{ product.name }}" required></div>
    <div class="mb-3"><label>Cost Price (TZS)</label><input type="number" step="0.01" name="cost_price" class="form-control" value="{{ product.cost_price }}" required></div>
    <div class="mb-3"><label>Selling Price (TZS)</label><input type="number" step="0.01" name="selling_price" class="form-control" value="{{ product.selling_price }}" required></div>
    <div class="mb-3"><label>Low Stock Threshold</label><input type="number" name="low_stock_threshold" class="form-control" value="{{ product.low_stock_threshold }}"></div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
