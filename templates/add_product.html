{% extends "base.html" %}
{% block content %}
<h2>Add New Product</h2>
<form method="POST">
    <div class="mb-3"><label>Product Name</label><input type="text" name="name" class="form-control" required></div>
    <div class="mb-3"><label>Cost Price (TZS)</label><input type="number" step="0.01" name="cost_price" class="form-control" required></div>
    <div class="mb-3"><label>Selling Price (TZS)</label><input type="number" step="0.01" name="selling_price" class="form-control" required></div>
    <div class="mb-3"><label>Initial Quantity</label><input type="number" name="quantity" class="form-control" value="0"></div>
    <div class="mb-3"><label>Low Stock Threshold</label><input type="number" name="low_stock_threshold" class="form-control" value="5"></div>
    <button type="submit" class="btn btn-primary">Add Product</button>
    <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
