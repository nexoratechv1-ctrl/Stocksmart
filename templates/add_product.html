{% extends "base.html" %}
{% block content %}
<h2>Add New Product</h2>
<form method="POST">
    <div class="mb-3"><label>Product Name</label><input type="text" name="name" class="form-control" required></div>
    <div class="mb-3"><label>Cost Price (TZS per unit)</label><input type="number" step="0.01" name="cost_price" class="form-control" required></div>
    <div class="mb-3"><label>Selling Price (TZS per unit)</label><input type="number" step="0.01" name="selling_price" class="form-control" required></div>
    <div class="mb-3"><label>Unit of Measure</label>
        <select name="unit" class="form-select">
            <option value="piece">Piece</option>
            <option value="liter">Liter</option>
            <option value="ml">Milliliter (ml)</option>
            <option value="gallon">Gallon</option>
            <option value="kg">Kilogram (kg)</option>
            <option value="gram">Gram (g)</option>
        </select>
        <small class="text-muted">For liquids, choose liter, ml, or gallon.</small>
    </div>
    <div class="mb-3"><label>Initial Stock (in units)</label><input type="number" step="0.01" name="quantity" class="form-control" value="0"></div>
    <div class="mb-3"><label>Low Stock Threshold (in units)</label><input type="number" step="0.01" name="low_stock_threshold" class="form-control" value="5"></div>
    <button type="submit" class="btn btn-primary">Add Product</button>
    <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
