{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3>Register Your Shop</h3>
                <form method="POST">
                    <div class="mb-3"><label>Shop Name</label><input type="text" name="shop_name" class="form-control" required></div>
                    <div class="mb-3"><label>Phone Number (used as username)</label><input type="tel" name="phone" class="form-control" required></div>
                    <div class="mb-3"><label>TIN (Optional, for tax reminders)</label><input type="text" name="tin" class="form-control"></div>
                    <div class="mb-3 form-check"><input type="checkbox" name="is_vat" id="is_vat" class="form-check-input"><label for="is_vat">I am registered for VAT (18%)</label></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <div class="mb-3"><label>Confirm Password</label><input type="password" name="confirm_password" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <hr>
                <p class="text-center">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
