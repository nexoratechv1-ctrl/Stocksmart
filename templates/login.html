{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h3>Login to StockSmart</h3>
                <form method="POST">
                    <div class="mb-3"><label>Phone Number</label><input type="tel" name="phone" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <div class="mb-3 form-check"><input type="checkbox" name="remember" id="remember" class="form-check-input"><label for="remember" class="form-check-label">Remember me (stay logged in)</label></div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr>
                <p class="text-center">Don't have an account? <a href="{{ url_for('register') }}">Register your shop</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
